<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="bg-red-500 grid grid-cols-2 md:grid-cols-1 lg:grid-cols-3 xl:grid-cols-5 2xl:grid-cols-6">
        <div class="bg-pink-500  col-span-3">Cards box 1</div>
        <div class="bg-blue-400 ">Cards box 2</div>
        <div class="bg-green-300 ">Cards box 3</div>
        <div class="bg-slate-500 ">Cards box 4</div>
        <div class="bg-purple-500 ">Cards box 5</div>
        <div class="bg-indigo-500 ">Cards box 6</div>
    </div>
    <hr>
    <hr>
    <hr>
    <div class="bg-red-500 grid grid-cols-4 w-[100%] h-[500px]">
        <div class="bg-pink-500 col-span-1">Cards box 1</div>
        <div class="bg-blue-400 col-sapn-1">Cards box 2</div>
        <div class="bg-green-300 col-span-2">Cards box 3</div>
        <div class="bg-slate-500 col-span-2">Cards box 4</div>
        <div class="bg-purple-500 col-span-1">Cards box 5</div>
        <div class="bg-indigo-500 col-span-1">Cards box 6</div>
    </div>
    <hr class="h-10">

    <!-- Responsive Layout using GRid -->
     <div class="2xl:container mx-auto">
        <div class="bg-red-800-500 grid grid-cols-4 w-[90%] h-[500px]">
            <div class="bg-pink-500 col-span-1">Cards box 1</div>
            <div class="bg-blue-400 col-sapn-1">Cards box 2</div>
            <div class="bg-green-300 col-span-2">Cards box 3</div>
            <div class="bg-slate-500 col-span-2">Cards box 4</div>
            <div class="bg-purple-500 col-span-1">Cards box 5</div>
            <div class="bg-indigo-500 col-span-1">Cards box 6</div>
        </div>
        <h1 class="bg-no-repeat bg-[url('')] "></h1>
     </div>
</body>
</html>
